{% extends "books/base.html" %}

{% block title %}
    Удаление {{ book.title }}
{% endblock title %}

{% block body %}
    <nav>
        <ul>
            <li><a href="{% url 'books:book' pk=book.pk %}">Вернуться назад</a></li>
        </ul>
    </nav>
    <h1>Вы уверены, что хотите удалить книгу {{book.title}}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Удалить книгу {{book.title}}</button>
    </form>
{% endblock body %}
